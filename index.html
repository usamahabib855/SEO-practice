 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness Hub</title>
  <link rel="stylesheet" href="index.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<meta name="google-site-verification" content="eQ15rrBOXcIU9Fhosa0jLvDW5-Xq7PQ54lB-iAB2-fc" />
</head>
<body class="body">

<!-- Sidebar -->

<div class="sidebar">

<h3>Fitness Tracker</h3>

<a href="#">🏠 Dashboard</a>
<a href="#">🔥 Calories</a>
<a href="#">📊 Activity</a>
<a href="#">💧 Water Tracker</a>
<a href="#">📈 Progress</a>
<a href="#">⚙ Settings</a>
<a href="#">🚪 Logout</a>

</div>

<!-- Navbar -->

<nav class="navbar p-3">

<div class="container-fluid">

<h4>Dashboard</h4>

<div>

<span>Usama Habib</span>

<img src="https://i.pravatar.cc/40" class="rounded-circle ms-2">

</div>

</div>

</nav>

<!-- Main Content -->

<div class="content">

<div class="row">

<!-- Steps -->

<div class="col-md-3">

<div class="card-box steps">

<h5>Steps Today</h5>

<h2>7,542</h2>

</div>

</div>

<!-- Calories -->

<div class="col-md-3">

<div class=" card-box calories">

<h5>Calories Burned</h5>

<h2>540 kcal</h2>

</div>

</div>

<!-- Water -->

<div class="col-md-3">

<div class="card-box water">

<h5>Water Intake</h5>

<h2>1.8 L</h2>

</div>

</div>

<!-- BMI -->

<div class="col-md-3">

<div class=" card-box bmi">

<h5>BMI</h5>

<h2>22.5</h2>

</div>

</div>

</div>

<br><br>

<!-- Progress Section -->

<div class="card p-4">

<h4>Weekly Activity</h4>

<canvas id="activityChart"></canvas>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const ctx = document.getElementById('activityChart');

new Chart(ctx, {
type: 'line',
data: {
labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
datasets: [{
label: 'Steps',
data: [4000,5000,7000,6500,8000,9000,7500],
borderWidth: 3
}]
},
options: {
responsive: true
}
});

</script>

</body>
</html>
</body>
</html>
